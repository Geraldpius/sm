{% extends "base/base.html" %}
{% block title %}My Profile{% endblock %}
{% block breadcrumb %}<span class="current">Profile</span>{% endblock %}
{% block content %}
<div class="page-header"><div><h1>My Profile</h1></div></div>
<div style="max-width:600px">
<div class="card">
    <div class="card-header"><h3>Personal Information</h3></div>
    <div class="card-body">
    <form method="post" enctype="multipart/form-data">{% csrf_token %}
    <div class="form-grid">
        <div class="form-group"><label class="form-label">First Name</label><input type="text" name="first_name" class="form-control" value="{{ request.user.first_name }}"></div>
        <div class="form-group"><label class="form-label">Last Name</label><input type="text" name="last_name" class="form-control" value="{{ request.user.last_name }}"></div>
        <div class="form-group"><label class="form-label">Email</label><input type="email" name="email" class="form-control" value="{{ request.user.email }}"></div>
        <div class="form-group"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control" value="{{ profile.phone }}"></div>
    </div>
    <div class="form-group"><label class="form-label">Profile Photo</label>{% if profile.photo %}<div style="margin-bottom:8px"><img src="{{ profile.photo.url }}" style="height:60px;border-radius:50%"></div>{% endif %}<input type="file" name="photo" class="form-control" accept="image/*"></div>
    <div class="divider"></div>
    <h4 style="margin-bottom:12px;font-size:14px">Change Password (optional)</h4>
    <div class="form-grid">
        <div class="form-group"><label class="form-label">Current Password</label><input type="password" name="old_password" class="form-control"></div>
        <div class="form-group"><label class="form-label">New Password</label><input type="password" name="new_password" class="form-control"></div>
    </div>
    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Profile</button>
    </form>
    </div>
</div>
</div>
{% endblock %}
