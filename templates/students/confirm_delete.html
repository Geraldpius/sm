{% extends "base/base.html" %}
{% block title %}Deactivate Student{% endblock %}
{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:60vh">
<div class="card" style="max-width:420px;width:100%">
    <div class="card-header" style="background:#fce8e6"><h3 style="color:#c62828"><i class="fas fa-exclamation-triangle"></i> Deactivate Student</h3></div>
    <div class="card-body">
        <p>Are you sure you want to deactivate <strong>{{ student.full_name }}</strong>? They will be hidden from active lists but data will be preserved.</p>
        <div style="margin-top:16px;display:flex;gap:10px;justify-content:flex-end">
            <a href="{% url 'student_detail' student.pk %}" class="btn btn-light">Cancel</a>
            <form method="post" style="display:inline">{% csrf_token %}<button type="submit" class="btn btn-danger"><i class="fas fa-user-times"></i> Deactivate</button></form>
        </div>
    </div>
</div>
</div>
{% endblock %}
