<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | School Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;min-height:100vh;background:linear-gradient(135deg,#1e3a5f 0%,#2d5a8e 50%,#1e3a5f 100%);display:flex;align-items:center;justify-content:center;padding:20px}
        .login-card{background:#fff;border-radius:16px;overflow:hidden;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .login-header{background:linear-gradient(135deg,#1e3a5f,#2d5a8e);padding:36px 32px;text-align:center}
        .logo-circle{width:72px;height:72px;border-radius:50%;background:#f0a500;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:#1e3a5f;margin:0 auto 16px;font-family:'Poppins',sans-serif}
        .login-header h1{color:#fff;font-size:20px;font-family:'Poppins',sans-serif;line-height:1.3}
        .login-header p{color:rgba(255,255,255,0.65);font-size:13px;margin-top:4px}
        .login-body{padding:32px}
        .form-group{margin-bottom:18px}
        .form-label{display:block;font-size:13px;font-weight:600;color:#2d3748;margin-bottom:6px}
        .input-wrap{position:relative}
        .input-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#a0aec0;font-size:15px}
        .form-control{width:100%;padding:10px 12px 10px 38px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;color:#2d3748;transition:border-color .2s;background:#fff}
        .form-control:focus{outline:none;border-color:#1e3a5f;box-shadow:0 0 0 3px rgba(30,58,95,.1)}
        .btn-login{width:100%;padding:12px;background:#1e3a5f;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
        .btn-login:hover{background:#2d5a8e}
        .alert{padding:12px 14px;border-radius:8px;font-size:13.5px;margin-bottom:16px;border-left:4px solid #dc3545;background:#fce8e6;color:#c62828;display:flex;align-items:center;gap:8px}
        .divider{text-align:center;font-size:12px;color:#a0aec0;margin:20px 0;position:relative}
        .divider::before{content:'';position:absolute;left:0;top:50%;height:1px;width:40%;background:#e2e8f0}
        .divider::after{content:'';position:absolute;right:0;top:50%;height:1px;width:40%;background:#e2e8f0}
        .login-footer{padding:16px 32px;background:#f8fafc;border-top:1px solid #e2e8f0;text-align:center;font-size:12px;color:#a0aec0}
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <div class="logo-circle">S</div>
        <h1>School Management System</h1>
        <p>Uganda Secondary Schools</p>
    </div>
    <div class="login-body">
        {% if messages %}
            {% for message in messages %}
            <div class="alert"><i class="fas fa-exclamation-circle"></i> {{ message }}</div>
            {% endfor %}
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password" required id="passField">
                </div>
            </div>
            <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Sign In</button>
        </form>
        <div class="divider">Secure Access</div>
        <p style="font-size:12px;color:#718096;text-align:center">Contact your administrator if you cannot log in.</p>
    </div>
    <div class="login-footer">
        &copy; School Management System &mdash; Uganda
    </div>
</div>
</body>
</html>
