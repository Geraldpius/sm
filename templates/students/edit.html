{% extends "base/base.html" %}
{% block title %}Edit Student{% endblock %}
{% block breadcrumb %}<a href="{% url 'student_list' %}">Students</a><span class="sep">/</span><a href="{% url 'student_detail' student.pk %}">{{ student.full_name }}</a><span class="sep">/</span><span class="current">Edit</span>{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Edit: {{ student.full_name }}</h1></div></div>
<form method="post" enctype="multipart/form-data">{% csrf_token %}
<div class="card">
    <div class="card-body">
    <div class="form-grid">
        <div class="form-group"><label class="form-label">First Name</label><input type="text" name="first_name" class="form-control" value="{{ student.first_name }}" required></div>
        <div class="form-group"><label class="form-label">Last Name</label><input type="text" name="last_name" class="form-control" value="{{ student.last_name }}" required></div>
        <div class="form-group"><label class="form-label">Other Names</label><input type="text" name="other_names" class="form-control" value="{{ student.other_names }}"></div>
        <div class="form-group"><label class="form-label">Gender</label><select name="gender" class="form-control"><option value="M" {% if student.gender == 'M' %}selected{% endif %}>Male</option><option value="F" {% if student.gender == 'F' %}selected{% endif %}>Female</option></select></div>
        <div class="form-group"><label class="form-label">Date of Birth</label><input type="date" name="date_of_birth" class="form-control" value="{{ student.date_of_birth|date:'Y-m-d' }}"></div>
        <div class="form-group"><label class="form-label">Class</label><select name="current_class" class="form-control"><option value="">-- No Class --</option>{% for cls in classes %}<option value="{{ cls.id }}" {% if student.current_class and student.current_class.id == cls.id %}selected{% endif %}>{{ cls }}</option>{% endfor %}</select></div>
        <div class="form-group"><label class="form-label">Guardian Phone</label><input type="text" name="guardian_phone" class="form-control" value="{{ student.guardian_phone }}"></div>
        <div class="form-group"><label class="form-label">Father Phone</label><input type="text" name="father_phone" class="form-control" value="{{ student.father_phone }}"></div>
        <div class="form-group"><label class="form-label">LIN Number</label><input type="text" name="lin_number" class="form-control" value="{{ student.lin_number }}"></div>
        <div class="form-group"><label class="form-label">Index Number</label><input type="text" name="index_number" class="form-control" value="{{ student.index_number }}"></div>
        <div class="form-check" style="padding-top:24px"><input type="checkbox" name="is_boarder" id="is_boarder" {% if student.is_boarder %}checked{% endif %}><label for="is_boarder" class="form-label mb-0">Boarder</label></div>
    </div>
    <div class="form-group"><label class="form-label">Photo</label>{% if student.photo %}<div style="margin-bottom:8px"><img src="{{ student.photo.url }}" style="height:60px;border-radius:8px"></div>{% endif %}<input type="file" name="photo" class="form-control" accept="image/*"></div>
    </div>
</div>
<div style="display:flex;gap:12px;justify-content:flex-end;margin-top:16px">
    <a href="{% url 'student_detail' student.pk %}" class="btn btn-light">Cancel</a>
    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
</div>
</form>
{% endblock %}
